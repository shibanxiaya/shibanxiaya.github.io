# Jekyll 站点配置 - shibanxiaya 个人博客
title: shibanxiaya's Blog
email: 704946175@qq.com
description: >-
  机器学习与NLP学习笔记，记录课程项目、实验心得与技术探索。
baseurl: ""
url: "https://shibanxiaya.github.io"
github_username: shibanxiaya

# 主题
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown 处理器
markdown: kramdown
kramdown:
  input: GFM

# 分页设置
paginate: 5
paginate_path: "/page:num/"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 时区
timezone: Asia/Shanghai
