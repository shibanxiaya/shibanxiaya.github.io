# Jekyll 站点配置 — ✏️ 踩坑笔记本
title: "✏️ 踩坑笔记本"
description: >-
  代码世界的摸爬滚打记录——Docker、Python、PyTorch、ML 实验中的真实踩坑经历。
baseurl: ""
url: "https://shibanxiaya.github.io"
github_username: shibanxiaya

# 主题
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown 处理器
markdown: kramdown
kramdown:
  input: GFM

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 时区
timezone: Asia/Shanghai
