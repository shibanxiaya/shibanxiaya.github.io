# Jekyll 站点配置 - 探索机器学习的奇妙世界
title: "🚀 代码与好奇心"
description: >-
  记录机器学习与NLP的探索之旅——实验、踩坑、思考与成长。
baseurl: ""
url: "https://shibanxiaya.github.io"
github_username: shibanxiaya

# 主题
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown 处理器
markdown: kramdown
kramdown:
  input: GFM

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 时区
timezone: Asia/Shanghai
